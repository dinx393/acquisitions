app:
  build:
    context: .
    dockerfile: Dockerfile
    target: production
  container_name: acquisitions-app-prod
  ports:
    - "3000:3000"
  env_file:
    - .env.production
  volumes:
    - ./logs:/app/logs
    - ./db/prod.db:/app/db/prod.db   # добавляем SQLite
  networks:
    - acquisitions-network
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 512M
      reservations:
        cpus: '0.5'
        memory: 256M
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - NET_BIND_SERVICE
  read_only: true
  tmpfs:
    - /tmp:rw,size=100M
    - /app/logs:rw,size=50M