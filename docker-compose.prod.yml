version: '3.8'

services:
  # Main application - Production
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: acquisitions-app-prod
    ports:
      - "3000:3000"
    environment:
      # Environment variables will be injected from external source
      # in production (Kubernetes secrets, Docker secrets, etc.)
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - PORT=${PORT:-3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
    volumes:
      # Only mount logs volume in production
      - ./logs:/app/logs
    networks:
      - acquisitions-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:rw,size=100M
      - /app/logs:rw,size=50M

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: acquisitions-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - acquisitions-network
    restart: unless-stopped
    profiles:
      - proxy  # Only start with --profile proxy

  # Optional: Monitoring and health checks
  healthcheck:
    image: curlimages/curl:latest
    container_name: acquisitions-healthcheck
    depends_on:
      - app
    networks:
      - acquisitions-network
    command: >
      sh -c "
        while true; do
          if curl -f http://app:3000/health; then
            echo 'Health check passed'
          else
            echo 'Health check failed'
          fi
          sleep 30
        done
      "
    restart: unless-stopped
    profiles:
      - monitoring  # Only start with --profile monitoring

networks:
  acquisitions-network:
    driver: bridge

volumes:
  logs:
    driver: local